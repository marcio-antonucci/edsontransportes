<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edson Transportes - Cotação</title>
    <style>
        :root {
            --verde-principal: #00FF66; /* Verde Néon Luminoso */
            --verde-escuro: #00B347; /* Verde Secundário */
            --fundo-principal: #121212; /* Fundo Escuro */
            --fundo-card: #1E1E1E;
            --texto-principal: #FFFFFF;
            --texto-secundario: #B3B3B3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fundo-principal);
            color: var(--texto-principal);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #003311 0%, #121212 60%);
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--fundo-card);
            border: 1px solid var(--verde-escuro);
            box-shadow: 0px 0px 20px rgba(0, 255, 102, 0.2);
            border-radius: 16px;
            margin: 30px 10px;
            overflow: hidden;
        }

        .header {
            background-color: var(--verde-escuro);
            color: #ffffff;
            text-align: center;
            padding: 30px 20px;
            border-bottom: 4px solid var(--verde-principal);
            box-shadow: 0 4px 15px rgba(0, 255, 102, 0.3);
        }

        .header h1 {
            margin: 0;
            font-size: 20pt;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .header p {
            margin: 5px 0 0 0;
            font-size: 10pt;
            font-weight: bold;
            letter-spacing: 1.5px;
            color: #FFF;
        }

        .badge-automacao {
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 8pt;
            display: inline-block;
            margin-top: 12px;
            border: 1px solid var(--verde-principal);
            color: var(--verde-principal);
            text-shadow: 0 0 8px var(--verde-principal);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
            font-weight: bold;
            letter-spacing: 1px;
        }

        form {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 10.5pt;
            color: var(--verde-principal);
            text-shadow: 0 0 4px rgba(0, 255, 102, 0.3);
        }

        input, select {
            width: 100%;
            padding: 12px;
            background-color: #2A2A2A;
            border: 2px solid #333;
            color: #FFF;
            border-radius: 8px;
            font-size: 11pt;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: #777;
        }

        input:focus, select:focus {
            border-color: var(--verde-principal);
            outline: none;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.5);
            background-color: #333;
        }

        .btn-enviar {
            background-color: transparent;
            color: var(--verde-principal);
            border: 2px solid var(--verde-principal);
            width: 100%;
            padding: 15px;
            font-size: 12pt;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0px 0px 10px rgba(0, 255, 102, 0.2), inset 0px 0px 10px rgba(0, 255, 102, 0.1);
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .btn-enviar:hover {
            background-color: var(--verde-principal);
            color: #000;
            box-shadow: 0px 0px 20px rgba(0, 255, 102, 0.6);
            transform: scale(1.02);
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 9pt;
            color: var(--texto-secundario);
            border-top: 1px solid #333;
            background: #1A1A1A;
            line-height: 1.6;
        }

        .footer strong {
            color: var(--texto-principal);
        }

        .footer .placa-destaque {
            display: inline-block;
            background-color: #EEEEEE;
            color: #111111;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            border: 1px solid #CCCCCC;
            margin: 4px 0;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1px;
        }

        .footer .neon-text {
            color: var(--verde-principal);
            text-shadow: 0 0 4px rgba(0, 255, 102, 0.4);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🚘 Edson Transportes</h1>
            <p>Viagens Executivas • Conforto & Segurança</p>
            <span class="badge-automacao">⚡ Automação Operacional: BoraUai</span>
        </div>

        <form id="formCotacao" onsubmit="enviarCotacao(event)">
            <div class="form-group">
                <label for="origem">📍 Local de Origem:</label>
                <input type="text" id="origem" placeholder="Ex: Aeroporto de Confins" required>
            </div>

            <div class="form-group">
                <label for="destino">🏁 Local de Destino:</label>
                <input type="text" id="destino" placeholder="Ex: Rua Rubi, 171 - Ibirité" required>
            </div>

            <div class="form-group">
                <label for="dataHora">📅 Data e Horário do Embarque:</label>
                <input type="datetime-local" id="dataHora" required>
            </div>

            <div class="form-group">
                <label for="passageiros">👥 Número de Passageiros:</label>
                <select id="passageiros">
                    <option value="1">1 Passageiro</option>
                    <option value="2">2 Passageiros</option>
                    <option value="3">3 Passageiros</option>
                    <option value="4">4 Passageiros (Capacidade Máxima)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="musica">🎵 Preferência Musical / Ambiente:</label>
                <select id="musica">
                    <option value="Sem preferência (Som ambiente)">Sem preferência (Som ambiente)</option>
                    <option value="Ar-condicionado e Silêncio">Prefiro viagem em silêncio</option>
                    <option value="Pop / Rock">Pop / Rock</option>
                    <option value="Sertanejo / MPB">Sertanejo / MPB</option>
                    <option value="Notícias / Rádio Local">Notícias / Rádio Local</option>
                </select>
            </div>

            <button type="submit" class="btn-enviar">🚖 Enviar Cotação (WhatsApp)</button>
        </form>

        <div class="footer">
            Plataforma homologada por <strong>BoraUai Technologies</strong><br>
            <strong>Condutor:</strong> Edson Wagner | CPF: 066.798.886-62<br>
            <strong>Placa do Veículo:</strong> <span class="placa-destaque">RNO8G11</span><br>
            <span class="neon-text">Chave PIX (Celular):</span> (31) 99526-1120<br>
            <span class="neon-text">Contato Comercial:</span> (31) 98950-0120
        </div>
    </div>

    <script>
        function enviarCotacao(event) {
            event.preventDefault();

            const origem = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;
            const dataHoraRaw = document.getElementById('dataHora').value;
            const passageiros = document.getElementById('passageiros').value;
            const musica = document.getElementById('musica').value;

            const dataOpcoes = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            const dataFormatada = new Date(dataHoraRaw).toLocaleDateString('pt-BR', dataOpcoes);

            const textoMensagem = 
                `Olá, Edson Wagner! Gostaria de realizar uma cotação de viagem através da plataforma Edson Transportes (BoraUai).\n\n` +
                `📍 *Origem:* ${origem}\n` +
                `🏁 *Destino:* ${destino}\n` +
                `📅 *Data/Hora:* ${dataFormatada}\n` +
                `👥 *Passageiros:* Até ${passageiros} pessoa(s)\n` +
                `🎵 *Preferência:* ${musica}\n\n` +
                `Por favor, me envie o valor e a confirmação da rota!`;

            const textoCodificado = encodeURIComponent(textoMensagem);

            // Link com redirecionamento para o WhatsApp Comercial
            const numeroWhats = "5531989500120"; 
            const urlWhatsApp = `https://api.whatsapp.com/send?phone=${numeroWhats}&text=${textoCodificado}`;

            window.open(urlWhatsApp, '_blank');
        }
    </script>
</body>
</html>
